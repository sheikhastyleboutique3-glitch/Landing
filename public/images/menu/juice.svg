<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" fill="#0a1628"/>
  <!-- Glass -->
  <path d="M170 90 L175 245 Q200 255 225 245 L230 90" fill="#0a1628" stroke="#f5f0e8" stroke-width="1.5" opacity="0.5"/>
  <!-- Juice liquid -->
  <path d="M173 100 L176 240 Q200 248 224 240 L227 100" fill="#e8873a" opacity="0.7"/>
  <!-- Glass top ellipse -->
  <ellipse cx="200" cy="90" rx="30" ry="10" fill="none" stroke="#f5f0e8" stroke-width="1.5" opacity="0.5"/>
  <!-- Juice color variation -->
  <path d="M175 120 L177 200 Q200 208 223 200 L225 120" fill="#c94d1a" opacity="0.3"/>
  <!-- Ice cubes -->
  <rect x="183" y="110" width="14" height="14" rx="2" fill="#f5f0e8" opacity="0.3" transform="rotate(10 190 117)"/>
  <rect x="200" y="125" width="12" height="12" rx="2" fill="#f5f0e8" opacity="0.25" transform="rotate(-5 206 131)"/>
  <!-- Straw -->
  <rect x="210" y="60" width="4" height="180" rx="2" fill="#7ec8f8" opacity="0.7"/>
  <!-- Orange slice on rim -->
  <circle cx="175" cy="85" r="15" fill="#e8873a" opacity="0.8"/>
  <circle cx="175" cy="85" r="12" fill="#f5a040" opacity="0.6"/>
  <path d="M167 85 L183 85 M175 77 L175 93 M169 79 L181 91 M181 79 L169 91" stroke="#c94d1a" stroke-width="0.8" opacity="0.5"/>
  <!-- Condensation drops -->
  <circle cx="228" cy="150" r="2" fill="#f5f0e8" opacity="0.2"/>
  <circle cx="226" cy="170" r="1.5" fill="#f5f0e8" opacity="0.15"/>
  <circle cx="229" cy="190" r="2" fill="#f5f0e8" opacity="0.2"/>
</svg>
