<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" fill="#0a1628"/>
  <!-- Box shape -->
  <path d="M100 130 L100 230 L300 230 L300 130 Z" fill="#142540" stroke="#4da8e8" stroke-width="1.5"/>
  <!-- Box lid (slightly open) -->
  <path d="M95 130 L200 100 L305 130 L200 115 Z" fill="#4a3520" stroke="#4da8e8" stroke-width="1"/>
  <!-- Compartments visible inside -->
  <line x1="200" y1="130" x2="200" y2="230" stroke="#4da8e8" stroke-width="0.5" opacity="0.4"/>
  <line x1="100" y1="180" x2="300" y2="180" stroke="#4da8e8" stroke-width="0.5" opacity="0.4"/>
  <!-- Kahi in top-left compartment -->
  <path d="M115 145 Q145 135 155 145" stroke="#7ec8f8" stroke-width="2" fill="none"/>
  <path d="M118 150 Q145 142 152 150" stroke="#4da8e8" stroke-width="1.5" fill="none"/>
  <!-- Cream in top-right -->
  <ellipse cx="250" cy="152" rx="30" ry="15" fill="#f5f0e0" opacity="0.8"/>
  <!-- Baklava in bottom-left -->
  <polygon points="120,195 135,188 150,195 135,202" fill="#60b5f0" stroke="#4da8e8" stroke-width="0.5"/>
  <polygon points="140,195 155,188 170,195 155,202" fill="#2d7ab8" stroke="#4da8e8" stroke-width="0.5"/>
  <!-- Syrup bottle in bottom-right -->
  <rect x="235" y="190" width="18" height="30" rx="4" fill="#1a2e4a" stroke="#4da8e8" stroke-width="0.8"/>
  <rect x="238" y="186" width="12" height="6" rx="2" fill="#4da8e8"/>
  <!-- Decorative ribbon -->
  <path d="M100 130 Q200 120 300 130" stroke="#60b5f0" stroke-width="3" fill="none"/>
  <!-- Brand stamp -->
  <circle cx="200" cy="115" r="12" fill="none" stroke="#4da8e8" stroke-width="1"/>
  <text x="200" y="119" text-anchor="middle" font-size="7" fill="#4da8e8" font-family="serif">GWK</text>
</svg>
