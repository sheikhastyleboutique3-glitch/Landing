<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" fill="#0a1628"/>
  <!-- Round plate -->
  <ellipse cx="200" cy="185" rx="120" ry="65" fill="#0f1e36" stroke="#4da8e8" stroke-width="1"/>
  <!-- Kunafa base (orange shredded phyllo) -->
  <ellipse cx="200" cy="170" rx="90" ry="45" fill="#60b5f0"/>
  <!-- Shredded texture lines -->
  <path d="M130 165 Q165 155 200 158 Q235 155 270 165" stroke="#e09060" stroke-width="1" opacity="0.6"/>
  <path d="M135 170 Q167 162 200 164 Q233 162 265 170" stroke="#4da8e8" stroke-width="0.8" opacity="0.5"/>
  <path d="M140 175 Q170 168 200 170 Q230 168 260 175" stroke="#e09060" stroke-width="0.8" opacity="0.4"/>
  <!-- Cheese melting -->
  <ellipse cx="200" cy="165" rx="50" ry="20" fill="#f5f0e0" opacity="0.4"/>
  <path d="M165 168 Q170 175 175 178" stroke="#f5f0e0" stroke-width="2" opacity="0.5" stroke-linecap="round"/>
  <path d="M225 166 Q230 174 233 180" stroke="#f5f0e0" stroke-width="2" opacity="0.5" stroke-linecap="round"/>
  <!-- Syrup drizzle on top -->
  <path d="M170 160 Q185 155 200 158 Q215 155 230 160" stroke="#4da8e8" stroke-width="2" opacity="0.7"/>
  <!-- Pistachio crumble -->
  <circle cx="185" cy="158" r="2.5" fill="#6b8f3c"/>
  <circle cx="195" cy="155" r="2" fill="#5a7a2a"/>
  <circle cx="208" cy="156" r="2.5" fill="#6b8f3c"/>
  <circle cx="215" cy="160" r="2" fill="#5a7a2a"/>
  <!-- Cut slice showing layers -->
  <path d="M200 170 L260 185 L258 195 L198 180 Z" fill="#142540" opacity="0.5"/>
</svg>
