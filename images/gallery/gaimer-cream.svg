<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="100%" height="auto" preserveAspectRatio="xMidYMid meet" style="max-width:100%;height:auto;">
  <defs>
    <linearGradient id="gc-bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1e36"/>
      <stop offset="100%" style="stop-color:#0a1628"/>
    </linearGradient>
    <radialGradient id="gc-bowl" cx="50%" cy="45%" r="50%">
      <stop offset="0%" style="stop-color:#4a3828"/>
      <stop offset="80%" style="stop-color:#2d1f14"/>
      <stop offset="100%" style="stop-color:#0a1628"/>
    </radialGradient>
    <radialGradient id="gc-cream" cx="45%" cy="40%" r="55%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="40%" style="stop-color:#f5f0e0"/>
      <stop offset="80%" style="stop-color:#ede5cc"/>
      <stop offset="100%" style="stop-color:#d4cbb0"/>
    </radialGradient>
    <linearGradient id="gc-honey" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4da8e8"/>
      <stop offset="50%" style="stop-color:#60b5f0"/>
      <stop offset="100%" style="stop-color:#b8651e"/>
    </linearGradient>
    <radialGradient id="gc-spotlight" cx="40%" cy="35%" r="50%">
      <stop offset="0%" style="stop-color:#4da8e8;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#0a1628;stop-opacity:0"/>
    </radialGradient>
    <filter id="gc-shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="600" height="400" fill="url(#gc-bg)"/>
  <rect width="600" height="400" fill="url(#gc-spotlight)"/>
  
  <!-- Table surface texture -->
  <rect x="0" y="280" width="600" height="120" fill="#2d2318" opacity="0.5"/>
  <line x1="0" y1="280" x2="600" y2="280" stroke="#3d3025" stroke-width="0.5" opacity="0.3"/>
  
  <!-- Bowl shadow -->
  <ellipse cx="300" cy="320" rx="160" ry="30" fill="#0a0805" opacity="0.5"/>
  
  <!-- Bowl outer -->
  <path d="M140 200 Q140 320 300 330 Q460 320 460 200" fill="url(#gc-bowl)" stroke="#4a3828" stroke-width="2"/>
  <!-- Bowl rim -->
  <ellipse cx="300" cy="200" rx="160" ry="40" fill="#3d2d1e" stroke="#5a4530" stroke-width="2"/>
  <ellipse cx="300" cy="198" rx="155" ry="37" fill="none" stroke="#6a5540" stroke-width="1" opacity="0.5"/>
  
  <!-- Cream surface -->
  <ellipse cx="300" cy="200" rx="145" ry="34" fill="url(#gc-cream)"/>
  
  <!-- Cream texture - soft peaks -->
  <path d="M200 195 Q220 185 240 192 Q260 183 280 190 Q300 182 320 190 Q340 184 360 192 Q380 186 400 195" fill="#ffffff" opacity="0.4"/>
  <path d="M220 200 Q240 192 260 198 Q280 190 300 197 Q320 191 340 198 Q360 192 380 200" fill="#ffffff" opacity="0.3"/>
  
  <!-- Cream peak in center -->
  <path d="M270 195 Q285 175 300 180 Q315 175 330 195 Q310 188 290 188 Z" fill="#ffffff" opacity="0.5"/>
  <path d="M280 190 Q290 180 300 183 Q310 180 320 190" fill="none" stroke="#f5f0e0" stroke-width="0.5" opacity="0.5"/>
  
  <!-- Honey drizzle pattern - spiral -->
  <path d="M250 190 Q270 185 290 195 Q310 200 330 192 Q350 185 360 195" fill="none" stroke="url(#gc-honey)" stroke-width="3" stroke-linecap="round" opacity="0.85"/>
  <path d="M230 205 Q260 198 290 208 Q320 212 350 205 Q370 198 380 203" fill="none" stroke="url(#gc-honey)" stroke-width="2.5" stroke-linecap="round" opacity="0.75"/>
  <path d="M270 195 Q285 200 300 195 Q315 190 330 197" fill="none" stroke="#4da8e8" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
  
  <!-- Honey pool spots -->
  <ellipse cx="290" cy="200" rx="8" ry="4" fill="#4da8e8" opacity="0.6"/>
  <ellipse cx="330" cy="195" rx="6" ry="3" fill="#60b5f0" opacity="0.5"/>
  <ellipse cx="260" cy="198" rx="5" ry="2.5" fill="#4da8e8" opacity="0.4"/>
  
  <!-- Honey drizzle from above -->
  <path d="M310 50 Q312 80 310 110 Q312 140 310 170 Q311 180 310 190" fill="none" stroke="url(#gc-honey)" stroke-width="4" stroke-linecap="round" opacity="0.9"/>
  <!-- Droplet forming -->
  <ellipse cx="310" cy="48" rx="4" ry="6" fill="#4da8e8" opacity="0.8"/>
  
  <!-- Spoon on the side -->
  <path d="M420 160 Q440 170 445 190 Q448 210 445 220 Q442 225 438 220 Q435 210 437 190 Q435 175 420 165 Z" fill="#8a7560" stroke="#6a5540" stroke-width="1"/>
  <path d="M420 160 Q410 140 415 120 Q418 100 430 80" fill="none" stroke="#8a7560" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Small garnish - cinnamon dust -->
  <circle cx="250" cy="202" r="1" fill="#8b4513" opacity="0.4"/>
  <circle cx="320" cy="198" r="0.8" fill="#8b4513" opacity="0.3"/>
  <circle cx="280" cy="205" r="0.6" fill="#8b4513" opacity="0.3"/>
  <circle cx="340" cy="202" r="0.7" fill="#8b4513" opacity="0.35"/>
  
  <!-- Bowl decorative pattern -->
  <path d="M165 240 Q180 235 195 240 Q210 245 225 240 Q240 235 255 240" fill="none" stroke="#5a4530" stroke-width="1" opacity="0.4"/>
  <path d="M345 240 Q360 235 375 240 Q390 245 405 240 Q420 235 435 240" fill="none" stroke="#5a4530" stroke-width="1" opacity="0.4"/>
  
  <!-- Light reflection on bowl rim -->
  <path d="M200 195 Q250 192 300 194" fill="none" stroke="#f5f0e0" stroke-width="1" opacity="0.3"/>
  
  <!-- Decorative cloth corner -->
  <path d="M0 350 Q50 340 100 355 Q80 370 60 380 L0 400 Z" fill="#60b5f0" opacity="0.3"/>
  <path d="M0 355 Q40 345 80 358" fill="none" stroke="#4da8e8" stroke-width="0.5" opacity="0.4"/>
  
  <!-- Ambient particles -->
  <circle cx="150" cy="100" r="1.5" fill="#4da8e8" opacity="0.2"/>
  <circle cx="480" cy="80" r="1" fill="#4da8e8" opacity="0.15"/>
  <circle cx="500" cy="150" r="1.2" fill="#60b5f0" opacity="0.1"/>
</svg>